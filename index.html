<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWS Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

</header>

<!-- MODULE GRID -->
<div id="moduleView" class="grid">
  <div class="card" onclick="openModule(1)">Module 1</div>
  <div class="card" onclick="openModule(2)">Module 2</div>
  <div class="card" onclick="openModule(3)">Module 3</div>
  <div class="card" onclick="openModule(4)">Module 4</div>
  <div class="card" onclick="openModule(5)">Module 5</div>
  <div class="card" onclick="openModule(6)">Module 6</div>
  <div class="card" onclick="openModule(7)">Module 7</div>
  <div class="card" onclick="openModule(8)">Module 8</div>
  <div class="card" onclick="openModule(9)">Module 9</div>
</div>

<!-- IMAGE VIEW -->
<div id="imageView" style="display:none;">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="moduleTitle"></h2>
  <div id="gallery" class="gallery"></div>
</div>

<script src="script.js"></script>
</body>
</html>
